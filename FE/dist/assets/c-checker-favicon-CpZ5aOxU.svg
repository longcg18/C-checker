<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="shieldClip">
      <path d="M50 5 L90 18 L90 52 C90 75 50 95 50 95 C50 95 10 75 10 52 L10 18 Z"/>
    </clipPath>
  </defs>

  <!-- Khiên nền xanh -->
  <path d="M50 5 L90 18 L90 52 C90 75 50 95 50 95 C50 95 10 75 10 52 L10 18 Z" fill="#1d4ed8"/>

  <!-- Viền khiên -->
  <path d="M50 5 L90 18 L90 52 C90 75 50 95 50 95 C50 95 10 75 10 52 L10 18 Z" fill="none" stroke="#60a5fa" stroke-width="1.5"/>

  <!-- Scan lines bên trong -->
  <g clip-path="url(#shieldClip)">
    <rect x="14" y="26" width="38" height="3" rx="1.5" fill="rgba(255,255,255,0.20)"/>
    <rect x="14" y="32" width="28" height="3" rx="1.5" fill="rgba(255,255,255,0.13)"/>
    <rect x="14" y="38" width="34" height="3" rx="1.5" fill="rgba(255,255,255,0.20)"/>
    <rect x="14" y="44" width="22" height="3" rx="1.5" fill="#f87171" opacity="0.80"/>
    <rect x="14" y="50" width="30" height="3" rx="1.5" fill="rgba(255,255,255,0.13)"/>
    <rect x="14" y="56" width="26" height="3" rx="1.5" fill="#f87171" opacity="0.60"/>
    <rect x="14" y="62" width="32" height="3" rx="1.5" fill="rgba(255,255,255,0.20)"/>
    <rect x="14" y="68" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.13)"/>
    <rect x="14" y="74" width="28" height="3" rx="1.5" fill="rgba(255,255,255,0.10)"/>
  </g>

  <!-- Chữ C trắng -->
  <text x="62" y="72" font-family="Georgia,serif" font-size="52" font-weight="800" fill="#ffffff" text-anchor="middle">C</text>

  <!-- Dấu tick xanh lá -->
  <circle cx="76" cy="68" r="10" fill="#22c55e"/>
  <path d="M71 68 l3.5 3.5 l6 -6" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
